name: tafrah-ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: cargo-test
        run: cargo test

  reference-oracles:
    name: reference-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        run: sh ./scripts/setup-rust.sh

      - name: reference-kat
        run: make test-reference

  native-artifacts:
    name: native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux
            abi_lib: libtafrah_abi.so
            uniffi_lib: libtafrah_uniffi.so
          - os: macos-latest
            id: macos
            abi_lib: libtafrah_abi.dylib
            uniffi_lib: libtafrah_uniffi.dylib
          - os: windows-latest
            id: windows
            abi_lib: tafrah_abi.dll
            uniffi_lib: tafrah_uniffi.dll

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: build-release-libs
        run: |
          cargo build -p tafrah-abi --release
          cargo build -p tafrah-uniffi --release

      - name: install-abi-layout
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/install-abi.sh "$PWD/dist/install"
          test -f "dist/install/lib/${{ matrix.abi_lib }}"
          cp "target/release/${{ matrix.uniffi_lib }}" "dist/install/lib/"

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.id }}
          path: dist/install

  uniffi-bindings:
    name: bindings-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: python
            os: ubuntu-latest
            language: python
          - name: kotlin
            os: ubuntu-latest
            language: kotlin
          - name: swift
            os: macos-latest
            language: swift

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: generate-bindings
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p tafrah-uniffi --release
          bash ./scripts/generate-uniffi-bindings.sh "${{ matrix.language }}" "$PWD/target/uniffi/${{ matrix.language }}"

      - uses: actions/upload-artifact@v4
        with:
          name: uniffi-${{ matrix.name }}
          path: target/uniffi/${{ matrix.language }}
