name: tafrah-ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            os: ubuntu-24.04
          - id: linux-aarch64
            os: ubuntu-24.04-arm
          - id: macos-aarch64
            os: macos-15
          - id: macos-x86_64
            os: macos-15-intel
          - id: windows-x86_64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: cargo-test
        run: cargo test

  reference-oracles:
    name: reference-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            os: ubuntu-24.04
          - id: linux-aarch64
            os: ubuntu-24.04-arm
          - id: macos-aarch64
            os: macos-15
          - id: macos-x86_64
            os: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        run: sh ./scripts/setup-rust.sh

      - name: reference-kat
        run: make test-reference

  native-artifacts:
    name: native-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            id: linux-x86_64
            abi_lib: libtafrah_abi.so
            abi_static_lib: libtafrah_abi.a
            uniffi_lib: libtafrah_uniffi.so
          - os: ubuntu-24.04-arm
            id: linux-aarch64
            abi_lib: libtafrah_abi.so
            abi_static_lib: libtafrah_abi.a
            uniffi_lib: libtafrah_uniffi.so
          - os: macos-15
            id: macos-aarch64
            abi_lib: libtafrah_abi.dylib
            abi_static_lib: libtafrah_abi.a
            uniffi_lib: libtafrah_uniffi.dylib
          - os: macos-15-intel
            id: macos-x86_64
            abi_lib: libtafrah_abi.dylib
            abi_static_lib: libtafrah_abi.a
            uniffi_lib: libtafrah_uniffi.dylib
          - os: windows-latest
            id: windows-x86_64
            abi_lib: tafrah_abi.dll
            abi_static_lib: tafrah_abi.lib
            uniffi_lib: tafrah_uniffi.dll

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: build-release-libs
        run: |
          cargo build -p tafrah-abi --release
          cargo build -p tafrah-uniffi --release

      - name: install-abi-layout
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/install-abi.sh "$PWD/dist/install"
          test -f "dist/install/lib/${{ matrix.abi_lib }}"
          test -f "dist/install/lib/${{ matrix.abi_static_lib }}"
          cp "target/release/${{ matrix.uniffi_lib }}" "dist/install/lib/"

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.id }}
          path: dist/install

  simd-bench:
    name: simd-bench-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: avx2-linux-x64
            os: ubuntu-24.04
            bench_features: avx2
            artifact_name: simd-bench-avx2-linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: run-simd-bench
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p tafrah-bench --release --features "${{ matrix.bench_features }}" -- --json > bench.json
          cat bench.json

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bench.json

  uniffi-bindings:
    name: bindings-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: python
            os: ubuntu-24.04
            language: python
          - name: kotlin
            os: ubuntu-24.04
            language: kotlin
          - name: swift
            os: macos-15
            language: swift

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: generate-bindings
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p tafrah-uniffi --release
          bash ./scripts/generate-uniffi-bindings.sh "${{ matrix.language }}" "$PWD/target/uniffi/${{ matrix.language }}"

      - uses: actions/upload-artifact@v4
        with:
          name: uniffi-${{ matrix.name }}
          path: target/uniffi/${{ matrix.language }}
