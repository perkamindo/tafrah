name: tafrah-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: cargo-test
        run: cargo test

  package:
    name: package-${{ matrix.id }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            os: ubuntu-latest
            abi_lib: libtafrah_abi.so
            uniffi_lib: libtafrah_uniffi.so
            archive_ext: tar.gz
          - id: macos
            os: macos-latest
            abi_lib: libtafrah_abi.dylib
            uniffi_lib: libtafrah_uniffi.dylib
            archive_ext: tar.gz
          - id: windows
            os: windows-latest
            abi_lib: tafrah_abi.dll
            uniffi_lib: tafrah_uniffi.dll
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: setup-rust
        shell: bash
        run: bash ./scripts/setup-rust.sh

      - name: build-release-libs
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p tafrah-abi --release
          cargo build -p tafrah-uniffi --release

      - name: assemble-install-layout
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/install-abi.sh "$PWD/dist/install"
          test -f "dist/install/lib/${{ matrix.abi_lib }}"
          cp "target/release/${{ matrix.uniffi_lib }}" "dist/install/lib/"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            pwsh -NoLogo -NoProfile -Command "Compress-Archive -Path 'dist/install/*' -DestinationPath 'tafrah-${{ github.ref_name }}-${{ matrix.id }}.${{ matrix.archive_ext }}'"
          else
            tar -C dist -czf "tafrah-${{ github.ref_name }}-${{ matrix.id }}.${{ matrix.archive_ext }}" install
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: tafrah-${{ github.ref_name }}-${{ matrix.id }}.${{ matrix.archive_ext }}

  release:
    name: github-release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: render-release-notes
        run: sh ./scripts/render-release-notes.sh "${GITHUB_REF_NAME}" "$RUNNER_TEMP/release-notes.md"

      - uses: softprops/action-gh-release@v2
        with:
          name: Tafrah ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
          append_body: true
          files: |
            tafrah-*.tar.gz
            tafrah-*.zip
