name: tafrah-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: make-test
        run: make test

  package:
    name: package-${{ matrix.id }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            os: ubuntu-latest
            abi_lib: libtafrah_abi.so
            uniffi_lib: libtafrah_uniffi.so
          - id: macos
            os: macos-latest
            abi_lib: libtafrah_abi.dylib
            uniffi_lib: libtafrah_uniffi.dylib

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: build-release-libs
        run: |
          make build-abi
          make build-uniffi

      - name: assemble-install-layout
        shell: bash
        run: |
          set -euo pipefail
          make install PREFIX="$PWD/dist/install"
          test -f "dist/install/lib/${{ matrix.abi_lib }}"
          cp "target/release/${{ matrix.uniffi_lib }}" "dist/install/lib/"
          tar -C dist -czf "tafrah-${{ github.ref_name }}-${{ matrix.id }}.tar.gz" install

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: tafrah-${{ github.ref_name }}-${{ matrix.id }}.tar.gz

  release:
    name: github-release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: render-release-notes
        run: sh ./scripts/render-release-notes.sh "${GITHUB_REF_NAME}" "$RUNNER_TEMP/release-notes.md"

      - uses: softprops/action-gh-release@v2
        with:
          name: Tafrah ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: tafrah-*.tar.gz
